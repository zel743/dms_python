<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfaz Despacho Flores (Dark Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        header_bg: '#0c0a09',
                        filter_bar_bg: '#4C4B48',
                        main_bg: '#E5E5E5',
                        btn_usuario_bg: '#394347',
                        btn_filtro_bg: '#E5E5E5',
                        input_bg: '#3f4345',
                        text_light: '#d6d6d6',
                        text_secondary: '#oklch(14.1% 0.005 285.823)',
                        logo_box_bg: '#cec4be',
                        text_b: '#0c0a09',
                        btn_custom: ''
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#242728] min-h-screen font-serif italic m-0 p-10 flex justify-center text-text_light">

    <div class="w-full max-w-7xl flex flex-col shadow-2xl">

        <header class="bg-header_bg px-8 py-6 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <!-- aqui va el logo-->
            <div class="w-35 h-20 border border-text_secondary relative bg-logo_box_bg">
                <img 
                src="/static/logo_oficial.png" 
                alt="Logo" 
                class="w-full h-full object-contain"
                />
            </div>
                <!-- aqui termina la secion edel logo-->
                <h1 class="text-3xl font-serif italic text-text_light tracking-[0.2em]">Despacho Flores</h1>
            </div>

            <button class="bg-btn_usuario_bg rounded-md px-12 py-3 text-sm font-medium text-text_light shadow hover:bg-gray-500 transition">
                Usuario
            </button>
        </header>

        <div class="font-serif italic bg-filter_bar_bg px-16 py-8 flex items-center gap-5 justify-center">
            <button onclick="ejecutarBusqueda('penal')" class="bg-btn_filtro_bg rounded-full px-4 py-2 w-32 text-center text-sm text-text_b shadow hover:bg-gray-600 transition">Penal</button>
            <button onclick="ejecutarBusqueda('civil')" class="bg-btn_filtro_bg rounded-full px-4 py-2 w-32 text-center text-sm text-text_b shadow hover:bg-gray-600 transition">Civil</button>
            <button onclick="ejecutarBusqueda('laboral')" class="bg-btn_filtro_bg rounded-full px-4 py-2 w-32 text-center text-sm text-text_b shadow hover:bg-gray-600 transition">Laboral</button>
            <button onclick="ejecutarBusqueda('amparo')" class="bg-btn_filtro_bg rounded-full px-4 py-2 w-32 text-center text-sm text-text_b shadow hover:bg-gray-600 transition">Amparo</button>
        </div>

        <main class="flex-1 bg-main_bg p-10">
            <div class="flex items-center justify-center gap-8 mt-4 ">
                
                <button onclick="ejecutarBusquedaCustom()" class="bg-btn_usuario_bg rounded-lg px-4 py-3 w-15 h-10 flex items-center text-sm text-text_light leading-tight shadow hover:bg-gray-500 transition text-left">
                    Buscar 
                </button>

                <input id="inputPalabra" type="text" onkeypress="verificarEnter(event)" class="bg-input_bg rounded-lg px-5 py-2 w-36 h-10 flex items-center text-sm text-white shadow-inner focus:outline-none focus:ring-1 focus:ring-gray-400" placeholder="Palabra Clave" />
                <button onclick="limpiarTodo()" class="bg-btn_usuario_bg rounded-lg hover:bg-gray-500 px-6 py-2 h-10 flex items-center text-sm text-white shadow transition-colors border border-gray-600">
                    Limpiar
                </button>
            </div>

            <div id="resultadosDiv" class="mt-10"></div>
        </main>

    </div>

    <script>
        function limpiarTodo() {
            document.getElementById('inputPalabra').value = '';
            
            document.getElementById('resultadosDiv').innerHTML = '';
        }
        function verificarEnter(event) {
            if (event.key === "Enter") {
                ejecutarBusquedaCustom();
            }
        }

        function ejecutarBusquedaCustom() {
            const palabraCustom = document.getElementById('inputPalabra').value.trim();
            if (palabraCustom) {
                ejecutarBusqueda(palabraCustom);
            } else {
                document.getElementById('resultadosDiv').innerHTML = '<p class="text-red-400">Por favor, escribe una palabra en el filtro custom.</p>';
            }
        }

        async function ejecutarBusqueda(palabra) {
            const resultadosDiv = document.getElementById('resultadosDiv');
            resultadosDiv.innerHTML = `<p class="text-black">Buscando archivos con "${palabra}", por favor espera...</p>`;
            
            try {
                const respuesta = await fetch('/buscar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ palabra: palabra })
                });
                
                const datos = await respuesta.json();
                
                if (datos.error) {
                    resultadosDiv.innerHTML = `<p class="text-red-400">${datos.error}</p>`;
                    return;
                }
                
                if (datos.resultados.length === 0) {
                    resultadosDiv.innerHTML = `<p class="text-black">No se encontraron PDFs con la palabra "${palabra}".</p>`;
                    return;
                }
                
                let html = `<p class="mb-4 text-black">✓ Se encontraron ${datos.resultados.length} PDFs con "${palabra}":</p>`;
                html += '<div class="space-y-3">';
                
                datos.resultados.forEach(pdf => {
                    const rutaSegura = pdf.ruta.split('\\').join('\\\\');
                    
                    html += `
                        <div class="bg-filter_bar_bg p-4 shadow flex justify-between items-center group">
                            <div class="flex-1 overflow-hidden pr-4">
                                <p class="font-bold text-white text-lg">${pdf.nombre}</p>
                                <p class="text-sm text-gray-300 mt-1 truncate" title="${pdf.ruta}">${pdf.ruta}</p>
                                <p class="text-xs text-gray-400 mt-1">Tamaño: ${pdf.tamaño} KB</p>
                            </div>
                            <button onclick="abrirArchivo('${rutaSegura}')" class="bg-btn_usuario_bg hover:bg-gray-400 px-6 py-2 text-sm text-white shadow transition-colors shrink-0 border border-gray-600">
                                Abrir PDF
                            </button>
                        </div>
                    `;
                });
                
                html += '</div>';
                resultadosDiv.innerHTML = html;
                
            } catch (error) {
                resultadosDiv.innerHTML = '<p class="text-red-600">Ocurrió un error de conexión con el servidor.</p>';
            }
        }

        async function abrirArchivo(rutaCompleta) {
            try {
                const respuesta = await fetch('/abrir', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ruta: rutaCompleta })
                });
                
                const datos = await respuesta.json();
                
                if (datos.error) {
                    alert('Error al abrir: ' + datos.error);
                }
            } catch (error) {
                alert('Hubo un error de conexión al intentar abrir el archivo.');
            }
        }
    </script>
</body>
</html>
